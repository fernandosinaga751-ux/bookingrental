<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Zone — Booking Rental Mobil Medan</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;--surface:#161616;--card:#1e1e1e;
      --accent:#f0c040;--accent2:#e05a00;--text:#f5f5f5;--muted:#888;--border:#2e2e2e;
      --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    .hidden{display:none!important}

    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;
      display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .topbar-brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text}
    .topbar-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
      background:rgba(240,192,64,.08);border:1px solid var(--border);border-radius:6px;padding:4px 10px}

    .hero{background:linear-gradient(135deg,#0d0d0d 40%,#1a0f00 100%);
      padding:52px 24px 0;text-align:center;position:relative;overflow:hidden}
    .brand-xl{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,11vw,90px);letter-spacing:6px;line-height:1;
      background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{color:var(--muted);font-size:13px;letter-spacing:4px;text-transform:uppercase;margin-top:6px}

    .form-wrap{max-width:720px;margin:-20px auto 60px;padding:0 16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px}
    .card-accent::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:16px 16px 0 0;margin:-28px -28px 22px}

    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .field-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;
      transition:border-color .2s,box-shadow .2s;width:100%;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,192,64,.1)}
    select option{background:#1e1e1e}
    textarea{resize:vertical;min-height:70px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

    .section-head{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--accent);
      display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .section-head::after{content:'';flex:1;height:1px;background:var(--border)}

    .car-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
    @media(min-width:640px){.car-grid{grid-template-columns:repeat(3,1fr)}}
    .car-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;
      padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;overflow:hidden}
    .car-card:hover{border-color:var(--muted);transform:translateY(-2px)}
    .car-card.selected{border-color:var(--accent);background:rgba(240,192,64,.05)}
    .car-card input[type=radio]{display:none}
    .car-img{width:100%;height:80px;object-fit:contain;margin-bottom:8px;border-radius:6px}
    .car-name{font-size:11px;font-weight:600;letter-spacing:1px;line-height:1.3}
    .car-price{font-size:11px;color:var(--accent);margin-top:4px}

    .toggle-row{display:flex;gap:10px}
    .toggle-btn{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:10px;
      color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
      padding:12px 8px;transition:all .2s;line-height:1.5;text-align:center}
    .toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(240,192,64,.07)}

    .summary-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px}

    .btn-xl{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;
      color:#000;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;
      padding:16px;width:100%;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-xl:hover{opacity:.9;transform:translateY(-2px)}

    hr.div{border:none;border-top:1px solid var(--border);margin:20px 0}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;
      align-items:center;justify-content:center;padding:20px}
    .overlay.show{display:flex}
    .success-box{background:var(--card);border:1px solid var(--accent);border-radius:20px;
      padding:36px 28px;text-align:center;max-width:420px;width:100%}
    .btn{border:none;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;
      font-size:13px;font-weight:600;padding:10px 20px;transition:all .2s}
    .btn:hover{opacity:.88;transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);opacity:1}
    .w-full{width:100%}

    .loading{display:flex;align-items:center;justify-content:center;padding:40px}
    .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:560px){
      .grid-2{grid-template-columns:1fr}
      .card{padding:20px 16px}
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Drive Zone</div>
  <div class="topbar-tag">Form Booking</div>
</div>

<div class="hero">
  <div class="brand-xl">Drive Zone</div>
  <div class="hero-sub">Rental Mobil Medan • Bandara Kualanamu</div>
</div>

<div class="form-wrap">
  <div class="card card-accent">
    <!-- Loading State -->
    <div id="loadingState" class="loading">
      <div class="loading-spinner"></div>
    </div>

    <form id="bForm" class="hidden">
      <div class="section-head">👤 Data Penyewa</div>
      <div class="grid-2">
        <div class="field">
          <label class="field-label">Nama Lengkap *</label>
          <input id="fNama" type="text" placeholder="Budi Santoso" required>
        </div>
        <div class="field">
          <label class="field-label">No. WhatsApp *</label>
          <input id="fWa" type="tel" placeholder="08xxxxxxxxxx" required>
        </div>
        <div class="field">
          <label class="field-label">Email</label>
          <input id="fEmail" type="email" placeholder="email@contoh.com">
        </div>
        <div class="field">
          <label class="field-label">No. KTP / SIM</label>
          <input id="fKtp" type="text" placeholder="3271xxxxxxxxxxxxxxx">
        </div>
      </div>

      <hr class="div">
      <div class="section-head">🚙 Pilih Kendaraan</div>
      <div class="car-grid" id="carGrid"></div>

      <hr class="div">
      <div class="section-head">📅 Detail Sewa</div>
      <div class="grid-2">
        <div class="field">
          <label class="field-label">Tanggal Penjemputan *</label>
          <input id="fStart" type="date" required onchange="calcEst()">
        </div>
        <div class="field">
          <label class="field-label">Tanggal Pengembalian *</label>
          <input id="fEnd" type="date" required onchange="calcEst()">
        </div>
        <div class="field">
          <label class="field-label">Jam Penjemputan</label>
          <input id="fWkt" type="time" value="08:00">
        </div>
        <div class="field">
          <label class="field-label">Lokasi Penjemputan *</label>
          <select id="fLok" required onchange="toggleAlamat()">
            <option value="">-- Pilih Lokasi --</option>
            <option value="Bandara Kualanamu">Bandara Kualanamu International Airport</option>
            <option value="Kota Medan">Kota Medan</option>
          </select>
        </div>
      </div>

      <div class="field hidden" id="alamatField">
        <label class="field-label">Alamat Penjemputan *</label>
        <textarea id="fAlamat" placeholder="Masukkan alamat lengkap penjemputan..."></textarea>
      </div>

      <div class="field">
        <label class="field-label">Dengan / Tanpa Supir</label>
        <div class="toggle-row">
          <button type="button" id="bD0" class="toggle-btn active" onclick="togDriver(0)">
            🧑‍✈️ Dengan Supir
          </button>
          <button type="button" id="bD1" class="toggle-btn" onclick="togDriver(1)">
            🔑 Lepas Kunci
          </button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Catatan Tambahan</label>
        <textarea id="fCt" placeholder="Misalnya: perlu baby seat, perjalanan luar kota, dsb..."></textarea>
      </div>

      <div id="estBox" class="summary-box hidden">
        <div style="font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px">Estimasi Biaya</div>
        <div id="estTxt" style="font-size:15px;font-weight:700;color:var(--accent)"></div>
        <div id="estDetail" style="font-size:12px;color:var(--muted);margin-top:4px"></div>
      </div>

      <button type="submit" class="btn-xl">🚀 PESAN SEKARANG → KIRIM KE WHATSAPP</button>
    </form>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="success-box">
    <div style="font-size:52px;margin-bottom:12px">✅</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);margin-bottom:6px">BOOKING TERKIRIM!</div>
    <p style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:18px">
      Pesanan berhasil dibuat &amp; tersimpan di database kami.<br>Gunakan ID di bawah untuk melacak status pesanan Anda.
    </p>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:4px">ID PESANAN</div>
      <div id="oId" style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--accent)"></div>
    </div>
    <button id="oCopy" class="btn btn-outline w-full" style="margin-bottom:8px" onclick="copyLink()">📋 Salin Link Tracking Pesanan</button>
    <button class="btn btn-primary w-full" onclick="goTrack()">🔍 Lihat Status Pesanan →</button>
    <button class="btn btn-outline w-full" style="margin-top:8px;color:var(--muted);font-size:12px" onclick="closeOverlay()">Buat Pesanan Baru</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// FIREBASE CONFIGURATION - GANTI DENGAN CONFIG ANDA
// ═══════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "GANTI_DENGAN_API_KEY_ANDA",
  authDomain: "drive-zone-rental.firebaseapp.com",
  projectId: "drive-zone-rental",
  storageBucket: "drive-zone-rental.appspot.com",
  messagingSenderId: "GANTI_DENGAN_SENDER_ID",
  appId: "GANTI_DENGAN_APP_ID"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const WA_NUMBER = '6281234567890';
const TRACKING_URL = 'tracking-firebase.html';

let CARS = {};
let selectedCar = '';
let driverMode = 0;
let lastBookingId = null;

// ═══════════════════════════════════════════════════════════
// LOAD CARS FROM FIREBASE
// ═══════════════════════════════════════════════════════════
async function loadCars() {
  try {
    const snapshot = await db.collection('cars').get();
    CARS = {};
    snapshot.forEach(doc => {
      CARS[doc.id] = doc.data();
    });
    
    if (Object.keys(CARS).length === 0) {
      // Default cars if none in database
      CARS = {
        avanza: {label:'New Avanza 2024',price:350000,img:'1000537007.png'},
        innova_reborn: {label:'Innova Reborn',price:500000,img:'1000537006.jpg'},
        innova_zenix: {label:'Innova Zenix',price:550000,img:'1000537006.jpg'},
        fortuner: {label:'Fortuner 2024',price:750000,img:'1000537008.jpg'},
        pajero: {label:'Pajero 2024',price:800000,img:'1000537014.jpg'},
        alphard_2023: {label:'Alphard 2023',price:1500000,img:'1000537012.jpg'},
        alphard_2025: {label:'New Alphard 2025',price:1800000,img:'1000537013.jpg'},
        hiace_commuter: {label:'Hiace Commuter',price:900000,img:'1000537011.jpg'},
        hiace_premio: {label:'Hiace Premio',price:1100000,img:'1000537010.jpg'},
      };
    }
    
    selectedCar = Object.keys(CARS)[0];
    renderCarGrid();
    
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('bForm').classList.remove('hidden');
  } catch (error) {
    console.error('Error loading cars:', error);
    alert('Gagal memuat data mobil. Silakan refresh halaman.');
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER CAR GRID
// ═══════════════════════════════════════════════════════════
function renderCarGrid() {
  const grid = document.getElementById('carGrid');
  grid.innerHTML = Object.entries(CARS).map(([key, car], idx) => `
    <label class="car-card ${idx===0?'selected':''}" onclick="selCar(this, '${key}')">
      <input type="radio" name="car" value="${key}" ${idx===0?'checked':''}>
      <img src="${car.img}" alt="${car.label}" class="car-img" onerror="this.src='🚗'">
      <div class="car-name">${car.label}</div>
      <div class="car-price">${fmt(car.price)}/hari</div>
    </label>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const fmt = n => 'Rp ' + Number(n).toLocaleString('id-ID');
const fmtD = v => {
  if(!v) return '-';
  const d = new Date(v+'T00:00:00');
  return d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
};

function selCar(el, carKey) {
  document.querySelectorAll('.car-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCar = carKey;
  calcEst();
}

function togDriver(m) {
  driverMode = m;
  document.getElementById('bD0').classList.toggle('active', m===0);
  document.getElementById('bD1').classList.toggle('active', m===1);
  calcEst();
}

function toggleAlamat() {
  const lokasi = document.getElementById('fLok').value;
  const alamatField = document.getElementById('alamatField');
  const fAlamat = document.getElementById('fAlamat');
  
  if(lokasi === 'Kota Medan') {
    alamatField.classList.remove('hidden');
    fAlamat.required = true;
  } else {
    alamatField.classList.add('hidden');
    fAlamat.required = false;
    fAlamat.value = '';
  }
}

function calcEst() {
  const s = document.getElementById('fStart').value;
  const e = document.getElementById('fEnd').value;
  if(!s||!e) return;
  
  const startDate = new Date(s+'T00:00:00');
  const endDate = new Date(e+'T00:00:00');
  const diffTime = endDate - startDate;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  const days = diffDays + 1;
  
  if(days <= 0) return;
  
  const car = CARS[selectedCar];
  const carPrice = car.price * days;
  const total = carPrice;
  
  document.getElementById('estBox').classList.remove('hidden');
  document.getElementById('estTxt').textContent = `${fmt(total)}`;
  document.getElementById('estDetail').textContent = `${days} hari × ${fmt(car.price)}/hari = ${fmt(carPrice)}`;
  
  return { days, total, carPrice };
}

// ═══════════════════════════════════════════════════════════
// SUBMIT FORM - SAVE TO FIREBASE
// ═══════════════════════════════════════════════════════════
document.getElementById('bForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const s = document.getElementById('fStart').value;
  const en = document.getElementById('fEnd').value;
  
  const startDate = new Date(s+'T00:00:00');
  const endDate = new Date(en+'T00:00:00');
  const diffDays = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));
  const days = diffDays + 1;
  
  if(days <= 0) {
    alert('Tanggal pengembalian harus sama atau setelah tanggal penjemputan!');
    return;
  }

  const car = CARS[selectedCar];
  const lokasi = document.getElementById('fLok').value;
  const alamat = document.getElementById('fAlamat').value;
  const lokasiLengkap = lokasi === 'Kota Medan' && alamat ? `${lokasi} - ${alamat}` : lokasi;

  // Generate Booking ID
  const n = new Date();
  const bookingId = `DZ${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}-${Math.random().toString(36).substr(2,6).toUpperCase()}`;

  const bookingData = {
    id: bookingId,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    nama: document.getElementById('fNama').value,
    wa: document.getElementById('fWa').value,
    email: document.getElementById('fEmail').value || '',
    ktp: document.getElementById('fKtp').value || '',
    car: selectedCar,
    carLabel: car.label,
    withDriver: driverMode === 0,
    startDate: s,
    endDate: en,
    waktu: document.getElementById('fWkt').value,
    lokasi: lokasiLengkap,
    catatan: document.getElementById('fCt').value || '-',
    days: days,
    carPrice: car.price,
    totalPrice: car.price * days,
    status: 'pending',
    paymentStatus: 'unpaid',
    driverName: '',
    driverPhone: '',
    vehiclePlate: '',
    paymentMethod: '',
    invoiceUrl: '',
    carPhotos: [],
    confirmedAt: null,
    completedAt: null,
  };

  try {
    // Save to Firebase
    await db.collection('bookings').doc(bookingId).set(bookingData);
    lastBookingId = bookingId;

    // Send WhatsApp
    const link = `${window.location.origin}${window.location.pathname.replace('index-firebase.html','')}tracking-firebase.html?id=${bookingId}`;
    const msg =
`🚗 *BOOKING BARU — Drive Zone*
━━━━━━━━━━━━━━━━━━━━━
🔖 *ID Pesanan: ${bookingId}*

👤 *DATA PENYEWA*
• Nama        : ${bookingData.nama}
• No. WA      : ${bookingData.wa}
• Email       : ${bookingData.email || '-'}
• No. KTP/SIM : ${bookingData.ktp || '-'}

🚙 *KENDARAAN*
• Mobil       : ${bookingData.carLabel}
• Pengemudi   : ${driverMode===0?'Dengan Supir (Gratis)':'Lepas Kunci (Mandiri)'}

📅 *DETAIL SEWA*
• Penjemputan : ${fmtD(s)} pukul ${bookingData.waktu}
• Pengembalian: ${fmtD(en)}
• Durasi      : ${days} hari
• Lokasi      : ${lokasiLengkap}

💰 *ESTIMASI BIAYA*
• Sewa        : ${fmt(car.price)} × ${days} hari = ${fmt(car.price * days)}
• Supir       : Gratis
• *TOTAL      : ${fmt(car.price * days)}*

📝 *CATATAN*
${bookingData.catatan}

🔗 *Link Tracking Pesanan:*
${link}
━━━━━━━━━━━━━━━━━━━━━`;

    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');

    // Show success
    document.getElementById('oId').textContent = bookingId;
    document.getElementById('overlay').classList.add('show');
    e.target.reset();
    renderCarGrid();
    driverMode = 0;
    document.getElementById('bD0').classList.add('active');
    document.getElementById('bD1').classList.remove('active');
    document.getElementById('estBox').classList.add('hidden');
    document.getElementById('alamatField').classList.add('hidden');
  } catch (error) {
    console.error('Error saving booking:', error);
    alert('Gagal menyimpan pesanan. Silakan coba lagi.');
  }
});

function copyLink() {
  if(!lastBookingId) return;
  const link = `${window.location.origin}${window.location.pathname.replace('index-firebase.html','')}tracking-firebase.html?id=${lastBookingId}`;
  navigator.clipboard.writeText(link).then(()=>{
    document.getElementById('oCopy').textContent = '✓ Link Berhasil Disalin!';
  });
}

function goTrack() {
  if(!lastBookingId) return;
  window.location.href = `${TRACKING_URL}?id=${lastBookingId}`;
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('oCopy').textContent = '📋 Salin Link Tracking Pesanan';
}

// Set min date
const today = new Date().toISOString().split('T')[0];
document.getElementById('fStart').min = today;
document.getElementById('fEnd').min = today;

// Initialize
loadCars();
</script>
</body>
</html>
